name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3]
        illuminate: [10.*, 11.*]

    name: PHP ${{ matrix.php }} - illuminate ${{ matrix.illuminate }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: Require illuminate ${{ matrix.illuminate }}
        run: |
          composer require "illuminate/bus:${{ matrix.illuminate }}" "illuminate/support:${{ matrix.illuminate }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
