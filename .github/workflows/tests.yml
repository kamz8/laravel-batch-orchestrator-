name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10, 11, 12, 13]
        include:
          - laravel: 10
            testbench: ^8.0
          - laravel: 11
            testbench: ^9.0
          - laravel: 12
            testbench: ^10.0
          - laravel: 13
            testbench: ^11.0
        exclude:
          # orchestra/testbench ^11.0 (Laravel 13's testbench line) requires PHP ^8.3.
          - php: 8.2
            laravel: 13

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    # Laravel 10 predates PHP 8.4's release; composer's constraint math allows
    # the combination but it was never validated upstream, so treat it as
    # best-effort rather than a hard gate.
    continue-on-error: ${{ matrix.php == '8.4' && matrix.laravel == 10 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: Require illuminate ${{ matrix.laravel }}.* and matching testbench
        run: |
          composer require "illuminate/bus:^${{ matrix.laravel }}.0" "illuminate/support:^${{ matrix.laravel }}.0" --no-interaction --no-update
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Allow older Laravel releases past composer's insecure-advisory gate
        # Composer refuses to resolve any laravel/framework release flagged by a
        # security advisory, which blocks every 10.x (and some 11.x/12.x) patch
        # release outright regardless of what we actually need. This only
        # affects dependency *resolution* in CI, not `composer audit` reporting.
        run: composer config audit.block-insecure false

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
